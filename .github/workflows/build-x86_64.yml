name: Build x86_64 firmware

on:
  workflow_dispatch:
    inputs:
      luci_version:
        description: "ImmortalWrt release"
        required: true
        default: "25.12.0"
        type: choice
        options:
          - "25.12.0"
          - "25.12.0-rc2"
          - "25.12.0-rc1"
          - "24.10.6"
          - "24.10.5"
          - "24.10.4"
          - "24.10.3"
          - "24.10.2"
          - "24.10.1"
          - "24.10.0"
      custom_router_ip:
        description: "Router management IP, for example 10.10.1.1"
        required: true
        default: "10.10.1.1"
      profile:
        description: "Rootfs partition size in MB"
        required: true
        default: "1024"
      enable_store:
        description: "Include luci-app-store"
        required: false
        type: boolean
        default: false
      include_docker:
        description: "Include Docker plugin"
        required: true
        default: "yes"
        type: choice
        options:
          - "yes"
          - "no"
      include_nikki:
        description: "Include Nikki transparent proxy"
        required: true
        default: "yes"
        type: choice
        options:
          - "yes"
          - "no"
      enable_pppoe:
        description: "Configure PPPoE credentials"
        required: true
        default: "no"
        type: choice
        options:
          - "yes"
          - "no"
      pppoe_account:
        description: "PPPoE account, required when PPPoE is enabled"
        required: false
      pppoe_password:
        description: "PPPoE password, required when PPPoE is enabled"
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      CUSTOM_ROUTER_IP: ${{ inputs.custom_router_ip }}
      ENABLE_PPPOE: ${{ inputs.enable_pppoe }}
      INCLUDE_DOCKER: ${{ inputs.include_docker }}
      INCLUDE_NIKKI: ${{ inputs.include_nikki }}
      LUCI_VERSION: ${{ inputs.luci_version }}
      PPPOE_ACCOUNT: ${{ inputs.pppoe_account }}
      PPPOE_PASSWORD: ${{ inputs.pppoe_password }}
      PROFILE: ${{ inputs.profile }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Select build files
        run: |
          case "$LUCI_VERSION" in
            24.10.*)
              echo "BUILD_SCRIPT=x86-64/build24.sh" >> "$GITHUB_ENV"
              echo "CONFIG_FILE=x86-64/imm.config" >> "$GITHUB_ENV"
              echo "STORE_PACKAGES_FILE=shell/custom-packages.sh" >> "$GITHUB_ENV"
              ;;
            25.12.*)
              echo "BUILD_SCRIPT=x86-64/build25.sh" >> "$GITHUB_ENV"
              echo "CONFIG_FILE=x86-64/imm25.config" >> "$GITHUB_ENV"
              echo "STORE_PACKAGES_FILE=shell/apk-custom-packages.sh" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unsupported ImmortalWrt release: $LUCI_VERSION"
              exit 1
              ;;
          esac

      - name: Prepare custom settings
        run: |
          chmod +x "$GITHUB_WORKSPACE/$BUILD_SCRIPT"
          mkdir -p "$GITHUB_WORKSPACE/custom"
          printf '%s\n' "$CUSTOM_ROUTER_IP" > "$GITHUB_WORKSPACE/custom/custom_router_ip.txt"
          echo "Router management IP: $CUSTOM_ROUTER_IP"

      - name: Validate PPPoE inputs
        run: |
          if [[ "$ENABLE_PPPOE" == "yes" ]]; then
            if [[ -z "$PPPOE_ACCOUNT" || -z "$PPPOE_PASSWORD" ]]; then
              echo "Error: PPPoE account and password are required when PPPoE is enabled."
              exit 1
            fi
          fi

      - name: Enable Store integration
        run: |
          if [[ "${{ inputs.enable_store }}" == "true" ]]; then
            echo 'CUSTOM_PACKAGES="$CUSTOM_PACKAGES luci-app-store"' >> "$GITHUB_WORKSPACE/$STORE_PACKAGES_FILE"
            echo "luci-app-store enabled"
          else
            echo "luci-app-store disabled"
          fi

      - name: Build ImmortalWrt x86_64 EFI firmware
        run: |
          echo "Building x86_64 firmware with ImmortalWrt $LUCI_VERSION"
          echo "Rootfs partition size: $PROFILE MB"
          echo "Include Docker: $INCLUDE_DOCKER"
          echo "Include Nikki: $INCLUDE_NIKKI"

          docker run --rm -i \
            --user root \
            -v "$GITHUB_WORKSPACE/bin:/home/build/immortalwrt/bin" \
            -v "$GITHUB_WORKSPACE/files:/home/build/immortalwrt/files" \
            -v "$GITHUB_WORKSPACE/custom:/home/build/immortalwrt/files/etc/config" \
            -v "$GITHUB_WORKSPACE/$CONFIG_FILE:/home/build/immortalwrt/.config" \
            -v "$GITHUB_WORKSPACE/shell:/home/build/immortalwrt/shell" \
            -v "$GITHUB_WORKSPACE/$BUILD_SCRIPT:/home/build/immortalwrt/build.sh" \
            -e PROFILE="$PROFILE" \
            -e INCLUDE_DOCKER="$INCLUDE_DOCKER" \
            -e INCLUDE_NIKKI="$INCLUDE_NIKKI" \
            -e ENABLE_PPPOE="$ENABLE_PPPOE" \
            -e PPPOE_ACCOUNT="$PPPOE_ACCOUNT" \
            -e PPPOE_PASSWORD="$PPPOE_PASSWORD" \
            "immortalwrt/imagebuilder:x86-64-openwrt-$LUCI_VERSION" \
            /bin/bash /home/build/immortalwrt/build.sh

      - name: Create release notes
        run: |
          cat > "$GITHUB_WORKSPACE/router-info.md" <<EOF
          ## x86_64 firmware

          - ImmortalWrt release: $LUCI_VERSION
          - Router address: $CUSTOM_ROUTER_IP
          - Username: root
          - Password: empty
          - Docker plugin: $INCLUDE_DOCKER
          - Nikki: $INCLUDE_NIKKI
          - Rootfs partition size: $PROFILE MB
          EOF

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v6
        with:
          name: x86_64-firmware-${{ inputs.luci_version }}
          path: ${{ github.workspace }}/bin/targets/x86/64/*squashfs-combined-efi.img.gz
          if-no-files-found: error

      - name: Upload firmware to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: Autobuild-x86_64-${{ inputs.luci_version }}
          name: ImmortalWrt x86_64 ${{ inputs.luci_version }}
          body_path: ${{ github.workspace }}/router-info.md
          files: |
            ${{ github.workspace }}/bin/targets/x86/64/*squashfs-combined-efi.img.gz
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
